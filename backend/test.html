<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Работа с числами</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 15px;
        }

        .output {
            width: 100%;
            height: 400px;
            border: 1px solid black;
            margin-bottom: 15px;
        }

        .row {
            margin-bottom: 10px;
        }

        input {
            width: 100px;
        }
    </style>
</head>
<body>

    <div class="output" id="output"></div>

    <div class="row">
        <button id="getBtn">вывести числа</button>
    </div>

    <div class="row">
        <label>Введите индекс</label>
        <input type="text" id="deleteIndex">
        <button id="deleteBtn">удалить число</button>
    </div>

    <div class="row">
        <label>Введите индекс</label>
        <input type="text" id="updateIndex">

        <label>Введите число</label>
        <input type="text" id="updateValue">

        <button id="updateBtn">обновить число</button>
    </div>

    <div class="row">
        <input type="text" id="addValue">
        <button id="addBtn">Добавить число</button>
    </div>


    <script src="script.js"></script>

</body>
</html>
