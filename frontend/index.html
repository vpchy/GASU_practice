<html>  
<head>  

<title>ArchSpace — Вход</title>  

    <link rel="stylesheet" href="style.css">  

</head>  

<body>  

    <div class="container">  

        <div class="logo">

            <h1>🏛️Arch<span>Space</span></h1>

            <p>Архитектурное пространство</p>  

        </div>  

  

        <div class="tabs">
            <div class ="tab-slider"></div>  

            <button class="tab active" id="loginTab">Вход</button>  

            <button class="tab" id="registerTab">Регистрация</button>  

        </div>  

  
        <div class="forms">

            <form id="loginForm" class="form active">  

            <div class="form-group">  

                <label>Email или номер телефона</label>  

                <input type="email" placeholder="Введите почту или номер телефона">  

            </div>

            <div class="form-group">  

                <label>Пароль</label>  

                <input type="password" placeholder="Пароль">  

            </div>  

            <button id="logineBut" type="button" class="btn btn-primary">Войти</button>  

            </form>  

  

            <form id="registerForm" class="form">  

                <div class="form-group">  

                    <label>Имя</label>  

                    <input type="text" placeholder="Введите имя">  

                </div>  

                <div class="form-group">  

                    <label>Email или номер телефона</label>  

                    <input type="email" placeholder="Введите почту или номер телефона">

                </div>  

                <div class="form-group">  
                    <label>Пароль</label>  
                    <input type="password" placeholder="Придумайте пароль">  
                </div>  
                <button id="createAndLogin" type="button" class="btn btn-primary" onclick="window.location.href='main.html'">Создать аккаунт</button>  
            </form>

        </div>

        <button id="createAccountBut" type="button" class="btn btn-secondary">Нет аккаунта? Создать</button>
    </div>
<script src="script.js"></script>  

</body>  

</html>
